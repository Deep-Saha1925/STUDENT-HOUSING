<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Property Details</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent:     #ff5e62;
            --accent-2:   #ff9966;
            --bg:         #faf7f4;
            --card-bg:    #ffffff;
            --text:       #1a1a1a;
            --text-muted: #777;
            --border:     rgba(0,0,0,0.08);
            --shadow:     0 8px 40px rgba(0,0,0,0.08);
            --owner-bg:   #faf7f4;
            --hr-color:   rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --bg:         #111112;
            --card-bg:    #1e1e22;
            --text:       #f0ede8;
            --text-muted: #888;
            --border:     rgba(255,255,255,0.07);
            --shadow:     0 8px 40px rgba(0,0,0,0.45);
            --owner-bg:   #26252a;
            --hr-color:   rgba(255,255,255,0.07);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 16px 60px;
            transition: background 0.35s, color 0.35s;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -100px; right: -100px;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,94,98,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -80px; left: -80px;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,153,102,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 18px; right: 18px;
            width: 38px; height: 38px;
            border-radius: 9px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.25s ease;
            z-index: 999;
            box-shadow: var(--shadow);
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: rotate(20deg);
        }

        /* Property card */
        .property-card {
            max-width: 920px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: background 0.35s;
            position: relative;
            z-index: 1;
        }

        /* Carousel */
        .carousel-item img {
            max-height: 440px;
            width: 100%;
            object-fit: contain;
            background: #0a0a0b;
        }

        .carousel-control-prev,
        .carousel-control-next {
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.45);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            margin: 0 12px;
        }

        .carousel-control-prev { left: 0; }
        .carousel-control-next { right: 0; }

        /* Card body */
        .card-body {
            padding: 32px 36px 28px;
            background: var(--card-bg);
            transition: background 0.35s;
        }

        /* Title */
        .prop-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        /* Location */
        .prop-location {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 18px;
        }

        /* Rent badge */
        .rent-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
        }

        .rent-badge {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 7px 16px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .rent-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Divider */
        hr {
            border-color: var(--hr-color);
            margin: 22px 0;
        }

        /* About section */
        .about-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .about-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.7;
        }

        /* Owner info */
        .owner-info {
            background: var(--owner-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 24px;
            transition: background 0.35s;
        }

        .owner-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .owner-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.88rem;
        }

        .owner-row:last-child { border-bottom: none; }

        .owner-icon {
            width: 30px; height: 30px;
            border-radius: 7px;
            background: rgba(255,94,98,0.1);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .owner-value { color: var(--text); font-weight: 500; }

        /* Back button */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--owner-bg);
            border: 1.5px solid var(--border);
            color: var(--text-muted);
            padding: 10px 22px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 9px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            margin-top: 22px;
        }
        .btn-back:hover {
            color: var(--text);
            border-color: var(--text);
        }

        @media (max-width: 576px) {
            .card-body { padding: 22px 18px 20px; }
        }
    </style>
</head>
<body>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
</button>

<div class="container">
    <div class="card property-card">

        <div id="propertyCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner text-center">
                <div th:each="imgUrl, stat : ${property.imageUrls}"
                     th:classappend="${stat.index == 0} ? 'active' : ''"
                     class="carousel-item">
                    <img th:src="${imgUrl}" class="d-block mx-auto" alt="Property Image">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#propertyCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#propertyCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

        <!-- Card Body -->
        <div class="card-body">

            <h3 class="prop-title" th:text="${property.title}">Property Title</h3>

            <p class="prop-location">
                <i class="bi bi-geo-alt-fill"></i>
                <span th:text="${property.city}"></span>,
                <span th:text="${property.area}"></span>
            </p>

            <div class="rent-wrap">
                <span class="rent-badge" th:text="'₹ ' + ${property.rent}"></span>
                <span class="rent-label">/ month</span>
            </div>


            <div th:if="${property.description}" class="mt-3 mb-2">
                <p class="about-title">
                    <i class="bi bi-info-circle"></i> About this Property
                </p>
                <p class="about-text" th:text="${property.description}"></p>
            </div>

            <hr>

            <div class="owner-info">
                <p class="owner-title">
                    <i class="bi bi-person-badge"></i> Owner Information
                </p>

                <div class="owner-row">
                    <div class="owner-icon"><i class="bi bi-person"></i></div>
                    <span class="owner-value" th:text="${property.owner.fullName}"></span>
                </div>

                <div class="owner-row">
                    <div class="owner-icon"><i class="bi bi-envelope"></i></div>
                    <span class="owner-value" th:text="${property.owner.email}"></span>
                </div>

                <div class="owner-row" th:if="${property.owner.phone}">
                    <div class="owner-icon"><i class="bi bi-telephone-fill"></i></div>
                    <span class="owner-value" th:text="${property.owner.phone}"></span>
                </div>
            </div>

            <a href="javascript:history.back()" class="btn-back">
                <i class="bi bi-arrow-left-circle"></i> Back
            </a>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const toggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const html      = document.documentElement;
    const saved     = localStorage.getItem('sh-theme') || 'light';
    applyTheme(saved);
    toggleBtn.addEventListener('click', () => {
        const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('sh-theme', next);
    });
    function applyTheme(theme) {
        html.dataset.theme = theme;
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        toggleBtn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
    }
</script>
</body>
</html>
