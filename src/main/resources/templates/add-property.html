<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Property</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --accent:       #ff5e62;
            --accent-2:     #ff9966;
            --bg:           #faf7f4;
            --card-bg:      #ffffff;
            --text:         #1a1a1a;
            --text-muted:   #777;
            --border:       rgba(0,0,0,0.09);
            --input-bg:     #f5f2ef;
            --input-border: #e0dbd5;
            --placeholder:  #aaa;
            --label:        #444;
            --shadow:       0 8px 40px rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --bg:           #111112;
            --card-bg:      #1e1e22;
            --text:         #f0ede8;
            --text-muted:   #888;
            --border:       rgba(255,255,255,0.07);
            --input-bg:     #26252a;
            --input-border: #35343a;
            --placeholder:  #555;
            --label:        #ccc;
            --shadow:       0 8px 40px rgba(0,0,0,0.45);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px;
            transition: background 0.35s, color 0.35s;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -100px; right: -100px;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,94,98,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -80px; left: -80px;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,153,102,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top bar ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            z-index: 999;
        }

        .brand-link {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.75;
            transition: opacity 0.2s;
        }
        .brand-link:hover { opacity: 1; color: var(--text); }

        .brand-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            flex-shrink: 0;
        }

        .theme-toggle {
            width: 38px; height: 38px;
            border-radius: 9px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.25s ease;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: rotate(20deg);
        }

        /* Push content below fixed top bar */
        .page-content {
            position: relative;
            z-index: 1;
            margin-top: 64px;
        }

        /* ── Card ── */
        .add-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: background 0.35s;
        }

        .add-card-header {
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            padding: 22px 28px;
            text-align: center;
        }

        .add-card-header .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.18);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .add-card-header h4 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: #fff;
            margin: 0;
            letter-spacing: -0.3px;
        }

        .add-card-body { padding: 28px 28px 24px; }

        /* ── Fields ── */
        .field-group { margin-bottom: 16px; }

        .field-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--label);
            margin-bottom: 6px;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }

        .field-group .form-control,
        .field-group textarea.form-control {
            background: var(--input-bg) !important;
            border: 1.5px solid var(--input-border) !important;
            color: var(--text) !important;
            border-radius: 10px !important;
            padding: 11px 14px !important;
            font-size: 0.88rem;
            font-family: 'DM Sans', sans-serif;
            width: 100%;
            transition: border-color 0.2s, background 0.35s, box-shadow 0.2s;
            -webkit-appearance: none;
            appearance: none;
            resize: vertical;
        }

        .field-group .form-control::placeholder { color: var(--placeholder) !important; }

        .field-group .form-control:focus {
            outline: none !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(255,94,98,0.12) !important;
            background: var(--card-bg) !important;
        }

        .field-group input[type="file"].form-control {
            padding: 9px 14px !important;
            cursor: pointer;
        }

        /* Two column row — single col on mobile */
        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .section-divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        /* ── Buttons ── */
        .btn-save {
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            border: none;
            color: #fff;
            padding: 12px 32px;
            font-size: 0.92rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 20px rgba(255,94,98,0.28);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255,94,98,0.36);
            opacity: 0.95;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }

        /* ── Mobile (≤575px) ── */
        @media (max-width: 575px) {
            .top-bar { padding: 10px 14px; }
            .page-content { margin-top: 58px; }
            .field-row { grid-template-columns: 1fr; }
            .add-card-body { padding: 20px 18px 18px; }
            .add-card-header { padding: 18px 20px; }
            .add-card-header h4 { font-size: 1.4rem; }
            .btn-save { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="top-bar">
    <a href="/" class="brand-link">
        <span class="brand-dot"></span>
        Student Housing
    </a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
</div>

<div class="page-content container animate__animated animate__fadeInUp">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <div class="add-card">

                <div class="add-card-header">
                    <div class="eyebrow"><i class="bi bi-plus-circle"></i> New Listing</div>
                    <h4>Add New Property</h4>
                </div>

                <div class="add-card-body">

                    <form th:action="@{'/properties/owner/' + ${ownerId} + '/add'}" method="post" th:object="${property}" enctype="multipart/form-data">

                        <div class="field-row">
                            <div class="field-group">
                                <label>Title</label>
                                <input type="text" class="form-control" th:field="*{title}" placeholder="Enter property title">
                            </div>
                            <div class="field-group">
                                <label>City</label>
                                <input type="text" class="form-control" th:field="*{city}" placeholder="Enter city">
                            </div>
                        </div>

                        <div class="field-group">
                            <label>Area</label>
                            <input type="text" class="form-control" th:field="*{area}" placeholder="Enter area or neighborhood">
                        </div>

                        <div class="section-divider"></div>

                        <div class="field-group">
                            <label class="d-flex align-items-center gap-2" style="text-transform:none;">
                                <input type="checkbox" th:field="*{availableMonthly}" style="width:auto;">
                                Available for Monthly Rent
                            </label>
                        </div>
                        <div class="field-group">
                            <label>Monthly Rent (₹)</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{monthlyRent}" placeholder="Enter monthly rent amount">
                        </div>

                        <div class="field-group">
                            <label class="d-flex align-items-center gap-2" style="text-transform:none;">
                                <input type="checkbox" th:field="*{availableDaily}" style="width:auto;">
                                Available for Daily Rent
                            </label>
                        </div>
                        <div class="field-group">
                            <label>Daily Rent (₹)</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{dailyRent}" placeholder="Enter daily rent amount">
                        </div>

                        <div class="section-divider"></div>

                        <div class="field-group">
                            <label>Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Enter property description"></textarea>
                        </div>

                        <div class="section-divider"></div>

                        <div class="field-group">
                            <label>Upload Images</label>
                            <input type="file" class="form-control" id="images" name="images" multiple required>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn-save">
                                <i class="bi bi-floppy"></i> Save Property
                            </button>
                        </div>

                    </form>

                    <div class="text-center">
                        <a th:href="@{'/properties/owner/' + ${ownerId}}" class="back-link">
                            <i class="bi bi-arrow-left"></i> Back to My Properties
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const toggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const html      = document.documentElement;
    const saved     = localStorage.getItem('sh-theme') || 'light';
    applyTheme(saved);
    toggleBtn.addEventListener('click', () => {
        const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('sh-theme', next);
    });
    function applyTheme(theme) {
        html.dataset.theme = theme;
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        toggleBtn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
    }
</script>
</body>
</html>
