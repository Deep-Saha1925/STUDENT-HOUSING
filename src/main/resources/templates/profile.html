<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Profile</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent:     #ff5e62;
            --accent-2:   #ff9966;
            --bg:         #faf7f4;
            --card-bg:    #ffffff;
            --text:       #1a1a1a;
            --text-muted: #777;
            --border:     rgba(0,0,0,0.08);
            --input-bg:   #f5f2ef;
            --shadow:     0 8px 40px rgba(0,0,0,0.08);
            --prop-bg:    #faf7f4;
            --label-color:#ff5e62;
        }
        [data-theme="dark"] {
            --bg:         #111112;
            --card-bg:    #1e1e22;
            --text:       #f0ede8;
            --text-muted: #888;
            --border:     rgba(255,255,255,0.07);
            --input-bg:   #26252a;
            --shadow:     0 8px 40px rgba(0,0,0,0.45);
            --prop-bg:    #26252a;
            --label-color:#ff7c7e;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 48px;
            transition: background 0.35s, color 0.35s;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -100px; right: -100px;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,94,98,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -80px; left: -80px;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,153,102,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Top bar ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 12px 18px;
            z-index: 999;
        }

        .theme-toggle {
            width: 38px; height: 38px;
            border-radius: 9px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.25s ease;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: rotate(20deg);
        }

        /* ── Profile card ── */
        .profile-card {
            max-width: 680px;
            margin: 56px auto 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: background 0.35s;
            position: relative;
            z-index: 1;
        }

        .profile-header {
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            color: white;
            text-align: center;
            padding: 40px 24px 32px;
        }

        .avatar-wrap {
            width: 84px; height: 84px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 3px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 2.6rem;
            color: #fff;
        }

        .profile-header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: 400;
            margin: 0 0 8px;
            letter-spacing: -0.3px;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            font-size: 0.73rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* ── Profile body ── */
        .profile-body { padding: 28px 28px 20px; }

        .info-section {
            background: var(--prop-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 22px;
            margin-bottom: 22px;
            transition: background 0.35s;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .info-row:last-child { border-bottom: none; }

        .info-icon {
            width: 34px; height: 34px;
            border-radius: 8px;
            background: rgba(255,94,98,0.1);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .info-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            line-height: 1;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 0.9rem;
            color: var(--text);
            font-weight: 500;
            word-break: break-all;
        }

        /* ── Properties section ── */
        .section-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.3px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .empty-msg {
            color: var(--text-muted) !important;
            font-size: 0.87rem;
            text-align: center;
            padding: 20px;
        }

        .property-card {
            background: var(--prop-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.35s;
        }
        .property-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        [data-theme="dark"] .property-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .property-card h5 {
            font-family: 'DM Serif Display', serif;
            font-size: 1rem;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 8px;
        }

        .property-card p {
            font-size: 0.84rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .property-card p strong { color: var(--label-color); font-weight: 600; }

        /* ── Back button ── */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--prop-bg);
            border: 1.5px solid var(--border);
            color: var(--text-muted);
            padding: 10px 22px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 9px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-back:hover { color: var(--text); border-color: var(--text); }

        .divider { height: 1px; background: var(--border); margin: 4px 0 22px; }

        /* ── Mobile (≤575px) ── */
        @media (max-width: 575px) {
            .profile-card { margin-top: 60px; border-radius: 14px; }
            .profile-header { padding: 30px 16px 24px; }
            .avatar-wrap { width: 68px; height: 68px; font-size: 2rem; }
            .profile-body { padding: 18px 16px 16px; }
            .info-section { padding: 14px 16px; }
            .btn-back { width: 100%; justify-content: center; }
        }

        /* ── Very small ── */
        @media (max-width: 360px) {
            .profile-header h2 { font-size: 1.15rem; }
            .role-badge { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<!-- ── Top bar (toggle only — no brand needed on profile) ── -->
<div class="top-bar">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
</div>

<div class="profile-card animate__animated animate__fadeInUp">

    <div class="profile-header">
        <div class="avatar-wrap">
            <i class="bi bi-person-fill"></i>
        </div>
        <h2 th:text="${user.fullName}">User Name</h2>
        <span class="role-badge">
            <i class="bi bi-shield-check"></i>
            <span th:text="${user.role}">Role</span>
        </span>
    </div>

    <div class="profile-body">

        <div class="info-section">
            <div class="info-row">
                <div class="info-icon"><i class="bi bi-hash"></i></div>
                <div>
                    <div class="info-label">User ID</div>
                    <div class="info-value" th:text="${user.id}"></div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="bi bi-envelope"></i></div>
                <div>
                    <div class="info-label">Email</div>
                    <div class="info-value" th:text="${user.email}"></div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="bi bi-telephone"></i></div>
                <div>
                    <div class="info-label">Phone</div>
                    <div class="info-value" th:text="${user.phone}"></div>
                </div>
            </div>
        </div>

        <div th:if="${user.role.toString() == 'OWNER' or user.role.toString() == 'ROLE_OWNER' or user.role == 'OWNER'}">
            <div class="divider"></div>
            <p class="section-title">
                <i class="bi bi-house-door"></i> Properties Listed
            </p>
            <div th:if="${#lists.isEmpty(user.properties)}">
                <p class="empty-msg">No properties listed yet.</p>
            </div>
            <div th:each="prop : ${user.properties}" class="property-card">
                <h5 th:text="${prop.title}">Property Title</h5>
                <p><strong>City:</strong> <span th:text="${prop.city}"></span></p>
                <p><strong>Area:</strong> <span th:text="${prop.area}"></span></p>
                <p><strong>Rent (₹):</strong> <span th:text="${prop.rent}"></span></p>
            </div>
        </div>

    </div>

    <div class="text-center mb-4">
        <a href="javascript:history.back()" class="btn-back">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const toggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const html      = document.documentElement;
    const saved     = localStorage.getItem('sh-theme') || 'light';
    applyTheme(saved);
    toggleBtn.addEventListener('click', () => {
        const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('sh-theme', next);
    });
    function applyTheme(theme) {
        html.dataset.theme = theme;
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        toggleBtn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
    }
</script>
</body>
</html>
