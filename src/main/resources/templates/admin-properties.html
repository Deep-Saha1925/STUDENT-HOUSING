<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Manage Properties</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
        --accent:     #ff5e62;
        --accent-2:   #ff9966;
        --bg:         #faf7f4;
        --card-bg:    #ffffff;
        --text:       #1a1a1a;
        --text-muted: #777;
        --border:     rgba(0,0,0,0.08);
        --nav-bg:     #1a1a1a;
        --shadow:     0 4px 24px rgba(0,0,0,0.07);
        --thead-bg:   #1a1a1a;
        --thead-text: #f0ede8;
        --row-hover:  #fdf6f3;
        --input-bg:   #f5f2ef;
    }
    [data-theme="dark"] {
        --bg:         #111112;
        --card-bg:    #1e1e22;
        --text:       #f0ede8;
        --text-muted: #888;
        --border:     rgba(255,255,255,0.07);
        --nav-bg:     #0d0d0e;
        --shadow:     0 4px 24px rgba(0,0,0,0.4);
        --thead-bg:   #111112;
        --thead-text: #f0ede8;
        --row-hover:  #26252a;
        --input-bg:   #26252a;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding-bottom: 60px;
        transition: background 0.35s, color 0.35s;
    }

    body::before {
        content: '';
        position: fixed;
        top: -100px; right: -100px;
        width: 420px; height: 420px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,94,98,0.07) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    /* Navbar */
    .navbar {
        background: var(--nav-bg) !important;
        padding: 14px 28px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .navbar-brand {
        font-family: 'DM Serif Display', serif;
        font-size: 1.25rem;
        color: #f0ede8 !important;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 9px;
    }

    .brand-dot {
        width: 9px; height: 9px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        flex-shrink: 0;
    }

    .theme-toggle {
        width: 36px; height: 36px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.07);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 0.95rem;
        transition: all 0.25s;
    }
    .theme-toggle:hover {
        background: rgba(255,255,255,0.15);
        transform: rotate(20deg);
    }

    /* Page header */
    .page-header {
        padding: 36px 0 20px;
        position: relative;
        z-index: 1;
    }

    .page-header h4 {
        font-family: 'DM Serif Display', serif;
        font-size: clamp(1.5rem, 3vw, 2rem);
        font-weight: 400;
        color: var(--text);
        letter-spacing: -0.4px;
        margin: 0;
    }

    .page-header p {
        color: var(--text-muted);
        font-size: 0.88rem;
        margin: 4px 0 0;
    }

    /* Card */
    .dash-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        overflow: hidden;
        transition: background 0.35s;
        position: relative;
        z-index: 1;
    }

    /* Table */
    .table { color: var(--text); margin: 0; }

    .table thead th {
        background: var(--thead-bg) !important;
        color: var(--thead-text) !important;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        padding: 14px 16px;
        border: none !important;
    }

    .table tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
    }

    .table tbody tr:hover { background: var(--row-hover) !important; }
    .table tbody tr:last-child { border-bottom: none; }

    .table > :not(caption) > * > * {
        background-color: transparent !important;
        color: var(--text) !important;
        border-color: var(--border) !important;
        padding: 13px 16px;
        font-size: 0.87rem;
        vertical-align: middle;
        border: none;
    }

    /* Rent badge */
    .badge-rent {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #fff;
        font-size: 0.78rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 6px;
    }

    /* Bottom bar */
    .bottom-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 24px;
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 12px;
        background: var(--card-bg);
        transition: background 0.35s;
    }

    .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--input-bg);
        border: 1.5px solid var(--border);
        color: var(--text-muted);
        padding: 8px 18px;
        font-size: 0.83rem;
        font-weight: 500;
        border-radius: 8px;
        text-decoration: none;
        transition: all 0.2s;
        font-family: 'DM Sans', sans-serif;
    }
    .btn-back:hover {
        color: var(--text);
        border-color: var(--text);
    }

    /* Pagination */
    .pagination { gap: 4px; }

    .page-link {
        background: var(--input-bg) !important;
        border: 1.5px solid var(--border) !important;
        color: var(--text) !important;
        border-radius: 8px !important;
        font-size: 0.83rem;
        font-weight: 500;
        padding: 7px 14px;
        transition: all 0.2s;
        font-family: 'DM Sans', sans-serif;
    }

    .page-link:hover {
        background: var(--row-hover) !important;
        border-color: var(--accent) !important;
        color: var(--accent) !important;
    }

    .page-item.disabled .page-link {
        opacity: 0.45;
        pointer-events: none;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid d-flex align-items-center gap-3">
    <a href="/admin/dashboard" class="navbar-brand">
      <span class="brand-dot"></span>
      Admin Panel
    </a>
    <div class="ms-auto">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
      </button>
    </div>
  </div>
</nav>

<div class="container mt-2">

  <div class="page-header">
    <h4>All Properties</h4>
    <p>Click any row to view property details</p>
  </div>

  <div class="dash-card">
    <div class="table-responsive">
      <table class="table table-hover align-middle text-center">
        <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>City</th>
          <th>Area</th>
          <th>Rent (₹)</th>
          <th>Owner</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${properties}"
            th:onclick="|window.location.href='/properties/${p.id}'|"
            style="cursor:pointer;">
          <td th:text="${p.id}"></td>
          <td th:text="${p.title}"></td>
          <td th:text="${p.city}"></td>
          <td th:text="${p.area}"></td>
          <td>
            <span class="badge-rent" th:text="'₹ ' + ${p.rent}"></span>
          </td>
          <td th:text="${p.owner.fullName}"></td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <a th:href="@{/admin/dashboard}" class="btn-back">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
      </a>

      <nav>
        <ul class="pagination mb-0">
          <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/properties(page=${currentPage - 1})}">
              <i class="bi bi-chevron-left"></i> Previous
            </a>
          </li>
          <li class="page-item disabled">
                        <span class="page-link">
                            Page <span th:text="${currentPage + 1}"></span>
                            of <span th:text="${totalPages}"></span>
                        </span>
          </li>
          <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/properties(page=${currentPage + 1})}">
              Next <i class="bi bi-chevron-right"></i>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const toggleBtn = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  const html      = document.documentElement;
  const saved     = localStorage.getItem('sh-theme') || 'light';
  applyTheme(saved);
  toggleBtn.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('sh-theme', next);
  });
  function applyTheme(theme) {
      html.dataset.theme = theme;
      themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
      toggleBtn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
  }
</script>
</body>
</html>
