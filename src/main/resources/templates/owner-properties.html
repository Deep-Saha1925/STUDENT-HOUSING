<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Owner Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent:     #ff5e62;
            --accent-2:   #ff9966;
            --bg:         #f5f2ef;
            --bg-alt:     #ffffff;
            --text:       #1a1a1a;
            --text-muted: #777;
            --border:     rgba(0,0,0,0.08);
            --nav-bg:     #1a1a1a;
            --card-bg:    #ffffff;
            --card-shadow:0 4px 24px rgba(0,0,0,0.07);
            --thead-bg:   #1a1a1a;
            --thead-text: #f0ede8;
            --row-hover:  #fdf6f3;
            --input-bg:   #f5f2ef;
        }
        [data-theme="dark"] {
            --bg:         #111112;
            --bg-alt:     #18181b;
            --text:       #f0ede8;
            --text-muted: #888;
            --border:     rgba(255,255,255,0.07);
            --nav-bg:     #0d0d0e;
            --card-bg:    #1e1e22;
            --card-shadow:0 4px 24px rgba(0,0,0,0.4);
            --thead-bg:   #111112;
            --thead-text: #f0ede8;
            --row-hover:  #26252a;
            --input-bg:   #26252a;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.35s, color 0.35s;
        }

        /* ── Navbar ── */
        .navbar {
            background: var(--nav-bg) !important;
            padding: 14px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            color: #f0ede8 !important;
            display: flex;
            align-items: center;
            gap: 9px;
            letter-spacing: -0.3px;
        }

        .brand-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            flex-shrink: 0;
            display: inline-block;
        }

        .welcome-text {
            color: rgba(255,255,255,0.65);
            font-size: 0.88rem;
            font-weight: 400;
        }

        .welcome-text strong {
            color: #fff;
            font-weight: 600;
        }

        /* Nav buttons */
        .btn-nav {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff !important;
            padding: 7px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-nav:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.25);
        }

        .btn-logout-nav {
            background: rgba(255,94,98,0.15);
            border: 1px solid rgba(255,94,98,0.3);
            color: #ff7c7e !important;
            padding: 7px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-logout-nav:hover {
            background: rgba(255,94,98,0.28);
            border-color: rgba(255,94,98,0.5);
            color: #fff !important;
        }

        /* Theme toggle */
        .theme-toggle {
            width: 36px; height: 36px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.07);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.25s;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.15);
            transform: rotate(20deg);
        }

        /* ── Page header ── */
        .page-header {
            padding: 42px 0 28px;
            text-align: center;
        }

        .page-header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.7rem, 3vw, 2.3rem);
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .page-header p {
            color: var(--text-muted) !important;
            font-size: 0.92rem;
            font-weight: 300;
            margin: 0;
        }

        /* Force body text to respect theme — but NOT thead */
        .container p,
        .container h2,
        .container h3,
        .container h4,
        .container label,
        .container span:not(.badge-rent) {
            color: var(--text);
        }

        .container .text-muted {
            color: var(--text-muted) !important;
        }

        /* Always keep thead white regardless of theme */
        .table thead th {
            background: var(--thead-bg) !important;
            color: var(--thead-text) !important;
        }

        /* ── Card ── */
        .dash-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            padding: 28px;
            transition: background 0.35s;
        }

        /* ── Table ── */
        .table {
            color: var(--text);
            margin: 0;
        }

        .table thead tr {
            background: var(--thead-bg);
        }

        .table thead th {
            background: var(--thead-bg);
            color: var(--thead-text);
            font-weight: 500;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 14px 16px;
            border: none;
        }

        .table thead th:first-child { border-radius: 10px 0 0 10px; }
        .table thead th:last-child  { border-radius: 0 10px 10px 0; }

        .table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .table tbody tr:hover { background: var(--row-hover); }
        .table tbody tr:last-child { border-bottom: none; }

        .table tbody td {
            padding: 14px 16px;
            font-size: 0.88rem;
            vertical-align: middle;
            border: none;
            color: var(--text);
        }

        /* Rent badge */
        .badge-rent {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            font-size: 0.8rem;
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: 600;
        }

        /* Availability toggle */
        .form-check-input {
            width: 38px;
            height: 20px;
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        /* Edit button */
        .btn-edit {
            background: rgba(255,153,102,0.12);
            border: 1px solid rgba(255,153,102,0.3);
            color: #d97706;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 7px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-edit:hover {
            background: rgba(255,153,102,0.25);
            border-color: rgba(255,153,102,0.5);
            color: #b45309;
        }

        [data-theme="dark"] .btn-edit { color: #fbbf24; }
        [data-theme="dark"] .btn-edit:hover { color: #fcd34d; }

        /* Add property button */
        .btn-add {
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            border: none;
            color: #fff !important;
            padding: 12px 28px;
            font-size: 0.92rem;
            font-weight: 600;
            border-radius: 10px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s;
            box-shadow: 0 6px 20px rgba(255,94,98,0.28);
            font-family: 'DM Sans', sans-serif;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255,94,98,0.36);
            opacity: 0.95;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* ── Force Bootstrap table to respect theme variables ── */
        .table > :not(caption) > * > * {
            background-color: transparent !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
        }

        .table tbody td,
        .table tbody td span,
        .table tbody td a,
        .table tbody tr td {
            color: var(--text) !important;
        }

        .table-responsive {
            background: var(--card-bg);
            border-radius: 10px;
            transition: background 0.35s;
        }

        /* Welcome text in navbar */
        .welcome-text,
        .welcome-text strong {
            color: rgba(255,255,255,0.85) !important;
        }
    </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid d-flex align-items-center gap-3">

        <a class="navbar-brand" href="#">
            <span class="brand-dot"></span>
            Owner Dashboard
        </a>

        <div class="ms-auto d-flex align-items-center gap-2 flex-wrap">

            <!-- ✅ UNCHANGED: owner name -->
            <span class="welcome-text">
                👋 Welcome, <strong th:text="${owner.fullName}"></strong>
            </span>

            <!-- Theme toggle -->
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <i class="bi bi-moon-fill" id="themeIcon"></i>
            </button>

            <!-- ✅ UNCHANGED: View Profile link -->
            <a th:href="@{'/profile/' + ${owner.id}}" class="btn-nav">
                <i class="bi bi-person-circle"></i> Profile
            </a>

            <!-- ✅ UNCHANGED: Contact Admin link -->
            <a th:href="@{/profile/admin}" class="btn-nav">
                <i class="bi bi-headset"></i> Contact Admin
            </a>

            <!-- ✅ UNCHANGED: logout form -->
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn-logout-nav">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>

        </div>
    </div>
</nav>

<!-- ── Main ── -->
<div class="container mt-2">

    <div class="page-header animate__animated animate__fadeInDown">
        <h2>My Properties</h2>
        <p>Manage and update all your listed properties</p>
    </div>

    <!-- ── Table card ── -->
    <div class="dash-card animate__animated animate__fadeInUp">
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>City</th>
                    <th>Area</th>
                    <th>Rent (₹)</th>
                    <th>Available</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>

                <!-- ✅ UNCHANGED: th:each, all th: bindings -->
                <tr th:each="p : ${properties}">
                    <td th:text="${p.title}"></td>
                    <td th:text="${p.city}"></td>
                    <td th:text="${p.area}"></td>
                    <td>
                        <span class="badge-rent" th:text="'₹ ' + ${p.rent}"></span>
                    </td>
                    <td>
                        <!-- ✅ UNCHANGED: availability toggle form -->
                        <form th:action="@{'/properties/owner/' + ${ownerId} + '/availability/' + ${p.id}}" method="post">
                            <input type="hidden" name="_method" value="patch"/>
                            <div class="form-check form-switch">
                                <input class="form-check-input"
                                       type="checkbox"
                                       name="available"
                                       th:checked="${p.available}"
                                       onchange="this.form.submit()">
                            </div>
                        </form>
                    </td>
                    <td>
                        <!-- ✅ UNCHANGED: edit link -->
                        <a th:href="@{'/properties/owner/' + ${ownerId} + '/edit/' + ${p.id}}" class="btn-edit">
                            <i class="bi bi-pencil-square"></i> Edit
                        </a>
                    </td>
                </tr>

                <!-- Empty state -->
                <tr th:if="${#lists.isEmpty(properties)}">
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="bi bi-house-slash d-block"></i>
                            No properties listed yet. Add your first one below!
                        </div>
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <!-- ✅ UNCHANGED: Add property link -->
    <div class="text-center mt-4 mb-5">
        <a th:href="@{'/properties/owner/' + ${ownerId} + '/add'}" class="btn-add">
            <i class="bi bi-plus-circle"></i> Add New Property
        </a>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* Theme Toggle */
    const toggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const html      = document.documentElement;
    const saved     = localStorage.getItem('sh-theme') || 'light';
    applyTheme(saved);
    toggleBtn.addEventListener('click', () => {
        const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('sh-theme', next);
    });
    function applyTheme(theme) {
        html.dataset.theme = theme;
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        toggleBtn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
    }
</script>
</body>
</html>
