<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Search Properties</title>
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:       #ff5e62;
      --accent-2:     #ff9966;
      --bg:           #faf7f4;
      --card-bg:      #ffffff;
      --text:         #1a1a1a;
      --text-muted:   #777;
      --border:       rgba(0,0,0,0.08);
      --input-bg:     #f5f2ef;
      --input-border: #e0dbd5;
      --placeholder:  #aaa;
      --shadow:       0 4px 24px rgba(0,0,0,0.07);
    }
    [data-theme="dark"] {
      --bg:           #111112;
      --card-bg:      #1e1e22;
      --text:         #f0ede8;
      --text-muted:   #888;
      --border:       rgba(255,255,255,0.07);
      --input-bg:     #26252a;
      --input-border: #35343a;
      --placeholder:  #555;
      --shadow:       0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
      transition: background 0.35s, color 0.35s;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: -100px; right: -100px;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,94,98,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -80px; left: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,153,102,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── Sticky top bar ── */
    .top-bar {
      position: sticky;
      top: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      z-index: 999;
      transition: background 0.35s;
    }

    .btn-back {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--card-bg); border: 1.5px solid var(--border);
      color: var(--text-muted); padding: 8px 14px;
      font-size: 0.83rem; font-weight: 500; border-radius: 8px;
      text-decoration: none; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif; white-space: nowrap;
    }
    .btn-back:hover { color: var(--text); border-color: var(--text); background: var(--input-bg); }

    .theme-toggle {
      width: 38px; height: 38px;
      border-radius: 9px; border: 1.5px solid var(--border);
      background: var(--card-bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem;
      transition: all 0.25s ease; box-shadow: var(--shadow); flex-shrink: 0;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); transform: rotate(20deg); }

    /* ── Titles ── */
    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 400; color: var(--text); letter-spacing: -0.5px;
      text-align: center; margin: 22px 0 6px; position: relative; z-index: 1;
    }
    .page-subtitle {
      text-align: center; color: var(--text-muted); font-size: 0.87rem;
      font-weight: 300; margin-bottom: 22px; position: relative; z-index: 1;
    }

    /* ── Search form ── */
    .search-wrap {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px; box-shadow: var(--shadow);
      max-width: 820px; margin: 0 auto 12px;
      position: relative; z-index: 1; transition: background 0.35s;
    }
    .search-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search-wrap .form-control {
      background: var(--input-bg) !important;
      border: 1.5px solid var(--input-border) !important;
      color: var(--text) !important; border-radius: 9px !important;
      padding: 10px 14px !important; font-size: 0.87rem;
      font-family: 'DM Sans', sans-serif; flex: 1; min-width: 120px;
      transition: border-color 0.2s, background 0.35s, box-shadow 0.2s;
    }
    .search-wrap .form-control::placeholder { color: var(--placeholder) !important; }
    .search-wrap .form-control:focus {
      outline: none !important; border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(255,94,98,0.1) !important;
      background: var(--card-bg) !important;
    }
    .btn-search {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      border: none; color: #fff; padding: 10px 20px; font-size: 0.87rem;
      font-weight: 600; border-radius: 9px; cursor: pointer;
      transition: all 0.2s; display: inline-flex; align-items: center;
      gap: 7px; font-family: 'DM Sans', sans-serif; white-space: nowrap;
      justify-content: center;
    }
    .btn-search:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── OR divider ── */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      max-width: 820px; margin: 0 auto 12px;
      position: relative; z-index: 1;
      color: var(--text-muted); font-size: 0.78rem;
    }
    .or-divider::before, .or-divider::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── Near Me ── */
    .nearme-wrap {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 18px; box-shadow: var(--shadow);
      max-width: 820px; margin: 0 auto 28px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      position: relative; z-index: 1; transition: background 0.35s;
    }
    .nearme-wrap label { font-size: 0.83rem; color: var(--text-muted); white-space: nowrap; }
    .radius-select {
      background: var(--input-bg) !important; border: 1.5px solid var(--input-border) !important;
      color: var(--text) !important; border-radius: 9px !important;
      padding: 8px 12px !important; font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.35s;
    }
    .btn-nearme {
      background: transparent; border: 1.5px solid var(--accent); color: var(--accent);
      padding: 9px 18px; font-size: 0.87rem; font-weight: 600; border-radius: 9px;
      cursor: pointer; transition: all 0.25s;
      display: inline-flex; align-items: center; gap: 7px;
      font-family: 'DM Sans', sans-serif; white-space: nowrap; justify-content: center;
    }
    .btn-nearme:hover { background: var(--accent); color: #fff; transform: translateY(-1px); }
    .btn-nearme.loading { opacity: 0.7; pointer-events: none; }
    #locationStatus { font-size: 0.79rem; color: var(--text-muted); }

    /* ── Result badge ── */
    .result-mode-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,94,98,0.1); color: var(--accent);
      border: 1px solid rgba(255,94,98,0.25);
      padding: 5px 13px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600; margin-bottom: 16px;
    }

    /* ── Property cards ── */
    .property-card {
      border: 1px solid var(--border) !important;
      border-radius: 14px !important; box-shadow: var(--shadow) !important;
      background: var(--card-bg) !important;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.35s !important;
      overflow: hidden !important;
    }
    .property-card:hover { transform: translateY(-5px) !important; box-shadow: 0 12px 32px rgba(0,0,0,0.1) !important; }
    [data-theme="dark"] .property-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.5) !important; }
    .property-img { width: 100%; height: 180px; object-fit: cover; }
    #propertyContainer { position: relative; z-index: 1; color: var(--text); }
    #propertyContainer .text-muted, #propertyContainer p { color: var(--text-muted) !important; }
    .property-card .card-body h5 { color: var(--text) !important; }
    .property-card .card-body p  { color: var(--text-muted) !important; }
    .property-card .card-body strong { color: var(--text) !important; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.8s linear infinite; }

    /* ── Mobile (≤575px) ── */
    @media (max-width: 575px) {
      .search-row { flex-direction: column; align-items: stretch; }
      .search-wrap .form-control { min-width: unset; width: 100%; }
      .btn-search { width: 100%; }
      .nearme-wrap { flex-direction: column; align-items: stretch; gap: 10px; }
      .btn-nearme { width: 100%; }
      #locationStatus { text-align: center; }
    }
  </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn" style="position:relative;z-index:1;">

  <!-- ── Top bar ── -->
  <div class="top-bar">
    <a href="/student/dashboard" class="btn-back">
      <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
  </div>

  <h2 class="page-title">Search Properties</h2>
  <p class="page-subtitle">Find affordable housing near your campus</p>

  <!-- ── Manual Search ── -->
  <div class="search-wrap">
    <form id="searchForm">
      <div class="search-row">
        <i class="bi bi-search text-muted d-none d-sm-block"></i>
        <input type="text"   class="form-control" id="cityInput" name="city"
               placeholder="Enter city / location" th:value="${city}">
        <input type="number" class="form-control" id="rentInput" name="rent"
               placeholder="Max Rent (₹)" th:value="${rent}">
        <select class="radius-select" id="rentalTypeSelect">
          <option value="" th:selected="${rentalType == null}">Any rental type</option>
          <option value="MONTHLY" th:selected="${rentalType == 'MONTHLY'}">Monthly only</option>
          <option value="DAILY" th:selected="${rentalType == 'DAILY'}">Daily only</option>
        </select>
        <button type="submit" class="btn-search">
          <i class="bi bi-search"></i> Search
        </button>
      </div>
    </form>
  </div>

  <div class="or-divider">or use your location</div>

  <!-- ── Near Me ── -->
  <div class="nearme-wrap">
    <i class="bi bi-geo-alt-fill" style="color:var(--accent);font-size:1.1rem;flex-shrink:0;"></i>
    <label>Search within:</label>
    <select class="radius-select" id="radiusSelect">
      <option value="2">2 km</option>
      <option value="5" selected>5 km</option>
      <option value="10">10 km</option>
      <option value="20">20 km</option>
    </select>
    <button class="btn-nearme" id="nearMeBtn" onclick="findNearMe()">
      <i class="bi bi-crosshair"></i> Find Near Me
    </button>
    <span id="locationStatus"></span>
  </div>

  <!-- ── Results ── -->
  <div id="propertyContainer">
    <div th:replace="~{fragments/property-list :: propertyList}"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const toggleBtn = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  const html      = document.documentElement;
  applyTheme(localStorage.getItem('sh-theme') || 'light');
  toggleBtn.addEventListener('click', () => {
    const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next); localStorage.setItem('sh-theme', next);
  });
  function applyTheme(t) {
    html.dataset.theme = t;
    themeIcon.className = t === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    toggleBtn.title     = t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("searchForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const city = document.getElementById("cityInput").value;
      const rent = document.getElementById("rentInput").value;
      const rentalType = document.getElementById("rentalTypeSelect").value;
      setStatus(''); showLoading();
      fetch(`/search?city=${encodeURIComponent(city)}&rent=${encodeURIComponent(rent)}&rentalType=${encodeURIComponent(rentalType)}`)
              .then(r => r.text()).then(html => setResults(html, null))
              .catch(err => console.error("Search error:", err));
    });
  });

  function findNearMe() {
    if (!navigator.geolocation) { setStatus('❌ Geolocation not supported.'); return; }
    const btn = document.getElementById('nearMeBtn');
    btn.classList.add('loading');
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Locating…';
    setStatus('Getting your location…');
    navigator.geolocation.getCurrentPosition(
            pos => {
              const { latitude: lat, longitude: lng } = pos.coords;
              const radius = document.getElementById('radiusSelect').value;
              setStatus(`📍 Found you! Searching within ${radius} km…`);
              showLoading();
              fetch(`/properties/nearby?lat=${lat}&lng=${lng}&radius=${radius}`)
                      .then(r => r.text())
                      .then(html => {
                        setResults(html, radius); setStatus('');
                        btn.classList.remove('loading');
                        btn.innerHTML = '<i class="bi bi-crosshair"></i> Find Near Me';
                      })
                      .catch(() => {
                        setStatus('❌ Something went wrong. Try again.');
                        btn.classList.remove('loading');
                        btn.innerHTML = '<i class="bi bi-crosshair"></i> Find Near Me';
                      });
            },
            err => {
              btn.classList.remove('loading');
              btn.innerHTML = '<i class="bi bi-crosshair"></i> Find Near Me';
              setStatus(err.code === err.PERMISSION_DENIED
                      ? '❌ Location permission denied.' : '❌ Could not get location. Try manual search.');
            },
            { timeout: 10000 }
    );
  }

  function showLoading() {
    document.getElementById('propertyContainer').innerHTML = `
      <div class="text-center py-5">
        <div class="spinner-border" style="color:var(--accent);width:2rem;height:2rem;" role="status"></div>
        <p class="mt-3" style="color:var(--text-muted);font-size:0.88rem;">Finding properties…</p>
      </div>`;
  }
  function setResults(htmlContent, radius) {
    const badge = radius ? `<div class="result-mode-badge">
      <i class="bi bi-geo-alt-fill"></i> Showing properties within ${radius} km of your location
    </div>` : '';
    document.getElementById('propertyContainer').innerHTML = badge + htmlContent;
  }
  function setStatus(msg) { document.getElementById('locationStatus').textContent = msg; }
</script>
</body>
</html>
