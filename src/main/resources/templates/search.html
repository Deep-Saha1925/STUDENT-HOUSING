<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Search Properties</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
        --accent:     #ff5e62;
        --accent-2:   #ff9966;
        --bg:         #faf7f4;
        --card-bg:    #ffffff;
        --text:       #1a1a1a;
        --text-muted: #777;
        --border:     rgba(0,0,0,0.08);
        --input-bg:   #f5f2ef;
        --input-border: #e0dbd5;
        --placeholder: #aaa;
        --shadow:     0 4px 24px rgba(0,0,0,0.07);
        --prop-bg:    #faf7f4;
    }
    [data-theme="dark"] {
        --bg:         #111112;
        --card-bg:    #1e1e22;
        --text:       #f0ede8;
        --text-muted: #888;
        --border:     rgba(255,255,255,0.07);
        --input-bg:   #26252a;
        --input-border: #35343a;
        --placeholder: #555;
        --shadow:     0 4px 24px rgba(0,0,0,0.4);
        --prop-bg:    #26252a;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
        font-family: 'DM Sans', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding-bottom: 60px;
        transition: background 0.35s, color 0.35s;
        position: relative;
    }

    body::before {
        content: '';
        position: fixed;
        top: -100px; right: -100px;
        width: 420px; height: 420px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,94,98,0.07) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    body::after {
        content: '';
        position: fixed;
        bottom: -80px; left: -80px;
        width: 320px; height: 320px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,153,102,0.06) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    /* Theme toggle */
    .theme-toggle {
        position: fixed;
        top: 18px; right: 18px;
        width: 38px; height: 38px;
        border-radius: 9px;
        border: 1.5px solid var(--border);
        background: var(--card-bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.25s ease;
        z-index: 999;
        box-shadow: var(--shadow);
    }
    .theme-toggle:hover {
        border-color: var(--accent);
        color: var(--accent);
        transform: rotate(20deg);
    }

    /* Top bar */
    .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 0 10px;
        flex-wrap: wrap;
        gap: 10px;
        position: relative;
        z-index: 1;
    }

    .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--card-bg);
        border: 1.5px solid var(--border);
        color: var(--text-muted);
        padding: 8px 16px;
        font-size: 0.83rem;
        font-weight: 500;
        border-radius: 8px;
        text-decoration: none;
        transition: all 0.2s;
        font-family: 'DM Sans', sans-serif;
    }
    .btn-back:hover {
        color: var(--text);
        border-color: var(--text);
        background: var(--input-bg);
    }

    /* Page title */
    .page-title {
        font-family: 'DM Serif Display', serif;
        font-size: clamp(1.6rem, 3vw, 2.2rem);
        font-weight: 400;
        color: var(--text);
        letter-spacing: -0.5px;
        text-align: center;
        margin: 28px 0 6px;
        position: relative;
        z-index: 1;
    }

    .page-subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.88rem;
        font-weight: 300;
        margin-bottom: 28px;
        position: relative;
        z-index: 1;
    }

    /* Search bar */
    .search-wrap {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
        box-shadow: var(--shadow);
        max-width: 780px;
        margin: 0 auto 36px;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
        transition: background 0.35s;
    }

    .search-wrap .form-control {
        background: var(--input-bg) !important;
        border: 1.5px solid var(--input-border) !important;
        color: var(--text) !important;
        border-radius: 9px !important;
        padding: 10px 14px !important;
        font-size: 0.88rem;
        font-family: 'DM Sans', sans-serif;
        flex: 1;
        min-width: 140px;
        transition: border-color 0.2s, background 0.35s, box-shadow 0.2s;
    }

    .search-wrap .form-control::placeholder { color: var(--placeholder) !important; }

    .search-wrap .form-control:focus {
        outline: none !important;
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 3px rgba(255,94,98,0.1) !important;
        background: var(--card-bg) !important;
    }

    .btn-search {
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        border: none;
        color: #fff;
        padding: 10px 22px;
        font-size: 0.88rem;
        font-weight: 600;
        border-radius: 9px;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-family: 'DM Sans', sans-serif;
        white-space: nowrap;
    }
    .btn-search:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    /* Property cards */
    .property-card {
        border: 1px solid var(--border) !important;
        border-radius: 14px !important;
        box-shadow: var(--shadow) !important;
        background: var(--card-bg) !important;
        transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.35s !important;
        overflow: hidden !important;
    }

    .property-card:hover {
        transform: translateY(-5px) !important;
        box-shadow: 0 12px 32px rgba(0,0,0,0.1) !important;
    }

    [data-theme="dark"] .property-card:hover {
        box-shadow: 0 12px 32px rgba(0,0,0,0.5) !important;
    }

    .property-img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    /* Empty / no results */
    #propertyContainer {
        position: relative;
        z-index: 1;
        color: var(--text);
    }

    #propertyContainer .text-muted,
    #propertyContainer p {
        color: var(--text-muted) !important;
    }
  </style>
</head>
<body>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <i class="bi bi-moon-fill" id="themeIcon"></i>
</button>

<div class="container animate__animated animate__fadeIn" style="position:relative; z-index:1;">

  <div class="top-bar">
    <a href="/student/dashboard" class="btn-back">
      <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
  </div>

  <h2 class="page-title">Search Properties</h2>
  <p class="page-subtitle">Find affordable housing near your campus</p>

  <div class="search-wrap">
    <form id="searchForm" class="d-flex gap-2 flex-wrap w-100 align-items-center">
      <input type="text" class="form-control" name="city" id="cityInput"
             placeholder="Enter city / location" th:value="${city}">
      <input type="number" class="form-control" name="rent" id="rentInput"
             placeholder="Max Rent (₹)" th:value="${rent}">
      <button type="submit" class="btn-search">
        <i class="bi bi-search"></i> Search
      </button>
    </form>
  </div>

  <div id="propertyContainer">
    <div th:replace="fragments/property-list :: propertyList"></div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  /* Theme Toggle */
  const toggleBtn = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  const html      = document.documentElement;
  const saved     = localStorage.getItem('sh-theme') || 'light';
  applyTheme(saved);
  toggleBtn.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('sh-theme', next);
  });
  function applyTheme(theme) {
      html.dataset.theme = theme;
      themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
      toggleBtn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
  }

  document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("searchForm").addEventListener("submit", function(event) {
          event.preventDefault();

          let city = document.getElementById("cityInput").value;
          let rent = document.getElementById("rentInput").value;

          fetch(`/search?city=${encodeURIComponent(city)}&rent=${encodeURIComponent(rent)}`)
              .then(res => res.text())
              .then(html => {
                  document.getElementById("propertyContainer").innerHTML = html;
              })
              .catch(err => console.error("Error fetching properties:", err));
      });
  });
</script>
</body>
</html>
