<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Profile</title>
    <!-- Bootstrap -->
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent:     #ff5e62;
            --accent-2:   #ff9966;
            --bg:         #faf7f4;
            --card-bg:    #ffffff;
            --text:       #1a1a1a;
            --text-muted: #777;
            --border:     rgba(0,0,0,0.08);
            --input-bg:   #f5f2ef;
            --shadow:     0 8px 40px rgba(0,0,0,0.08);
            --prop-bg:    #faf7f4;
            --label-color:#ff5e62;
        }
        [data-theme="dark"] {
            --bg:         #111112;
            --card-bg:    #1e1e22;
            --text:       #f0ede8;
            --text-muted: #888;
            --border:     rgba(255,255,255,0.07);
            --input-bg:   #26252a;
            --shadow:     0 8px 40px rgba(0,0,0,0.45);
            --prop-bg:    #26252a;
            --label-color:#ff7c7e;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 16px;
            transition: background 0.35s, color 0.35s;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -100px; right: -100px;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,94,98,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -80px; left: -80px;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,153,102,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .theme-toggle {
            position: fixed;
            top: 18px; right: 18px;
            width: 38px; height: 38px;
            border-radius: 9px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.25s ease;
            z-index: 999;
            box-shadow: var(--shadow);
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: rotate(20deg);
        }

        .profile-card {
            max-width: 520px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: background 0.35s;
            position: relative;
            z-index: 1;
        }

        .profile-header {
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            text-align: center;
            padding: 44px 24px 36px;
        }

        .avatar-wrap {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 3px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2.8rem;
            color: #fff;
        }

        .profile-header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: #fff;
            margin: 0 0 10px;
            letter-spacing: -0.3px;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .profile-body { padding: 32px; }

        .info-section {
            background: var(--prop-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 24px;
            transition: background 0.35s;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .info-row:last-child { border-bottom: none; }

        .info-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: rgba(255,94,98,0.1);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .info-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            line-height: 1;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 0.92rem;
            color: var(--text);
            font-weight: 500;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--prop-bg);
            border: 1.5px solid var(--border);
            color: var(--text-muted);
            padding: 10px 22px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 9px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-back:hover {
            color: var(--text);
            border-color: var(--text);
            background: var(--input-bg);
        }
    </style>
</head>
<body>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
</button>

<div class="profile-card animate__animated animate__fadeInUp">

    <div class="profile-header">
        <div class="avatar-wrap">
            <i class="bi bi-shield-fill-check"></i>
        </div>
        <h2>ADMIN</h2>
        <span class="admin-badge">
                <i class="bi bi-shield-check"></i> Administrator
            </span>
    </div>

    <!-- Body -->
    <div class="profile-body">
        <div class="info-section">
            <div class="info-row">
                <div class="info-icon"><i class="bi bi-envelope"></i></div>
                <div>
                    <div class="info-label">Email</div>
                    <div class="info-value" th:text="${user.email}"></div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="bi bi-telephone"></i></div>
                <div>
                    <div class="info-label">Phone</div>
                    <div class="info-value" th:text="${user.phone}"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mb-4">
        <a href="javascript:history.back()" class="btn-back">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const toggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const html      = document.documentElement;
    const saved     = localStorage.getItem('sh-theme') || 'light';
    applyTheme(saved);
    toggleBtn.addEventListener('click', () => {
        const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('sh-theme', next);
    });
    function applyTheme(theme) {
        html.dataset.theme = theme;
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        toggleBtn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
    }
</script>
</body>
</html>
