<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Unauthorized</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent:     #ff5e62;
            --accent-2:   #ff9966;
            --bg:         #faf7f4;
            --card-bg:    #ffffff;
            --text:       #1a1a1a;
            --text-muted: #777;
            --border:     rgba(0,0,0,0.08);
            --shadow:     0 8px 40px rgba(0,0,0,0.08);
            --owner-bg:   #faf7f4;
        }
        [data-theme="dark"] {
            --bg:         #111112;
            --card-bg:    #1e1e22;
            --text:       #f0ede8;
            --text-muted: #888;
            --border:     rgba(255,255,255,0.07);
            --shadow:     0 8px 40px rgba(0,0,0,0.45);
            --owner-bg:   #26252a;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            transition: background 0.35s, color 0.35s;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -100px; right: -100px;
            width: 420px; height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,94,98,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -80px; left: -80px;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,153,102,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .theme-toggle {
            position: fixed;
            top: 18px; right: 18px;
            width: 38px; height: 38px;
            border-radius: 9px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.25s ease;
            box-shadow: var(--shadow);
            z-index: 10;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); transform: rotate(20deg); }

        .unauth-card {
            max-width: 460px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 40px 36px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .unauth-icon-wrap {
            width: 72px; height: 72px;
            margin: 0 auto 22px;
            border-radius: 20px;
            background: rgba(255,94,98,0.1);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .unauth-code {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .unauth-card h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .unauth-message {
            background: var(--owner-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 26px;
            line-height: 1.6;
        }

        .unauth-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-unauth {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 11px 22px;
            font-size: 0.87rem;
            font-weight: 600;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        .btn-unauth-primary {
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            color: #fff;
            box-shadow: 0 6px 20px rgba(255,94,98,0.28);
        }
        .btn-unauth-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,94,98,0.36); color: #fff; }

        .btn-unauth-secondary {
            background: var(--owner-bg);
            border: 1.5px solid var(--border);
            color: var(--text-muted);
        }
        .btn-unauth-secondary:hover { color: var(--text); border-color: var(--text); }

        @media (max-width: 575px) {
            .unauth-card { padding: 32px 24px; }
            .unauth-actions { flex-direction: column; }
            .btn-unauth { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <i class="bi bi-moon-fill" id="themeIcon"></i>
</button>

<div class="unauth-card animate__animated">
    <div class="unauth-icon-wrap">
        <i class="bi bi-shield-lock-fill"></i>
    </div>
    <div class="unauth-code">403 &middot; Unauthorized</div>
    <h2>This isn't your page to view</h2>
    <p class="unauth-message" th:text="${errorMessage} ?: 'You don\'t have permission to access this resource.'"></p>

    <div class="unauth-actions">
        <a href="javascript:history.back()" class="btn-unauth btn-unauth-secondary">
            <i class="bi bi-arrow-left-circle"></i> Go Back
        </a>
        <a href="/" class="btn-unauth btn-unauth-primary">
            <i class="bi bi-house-door-fill"></i> Home
        </a>
    </div>
</div>

<script>
    const toggleBtn = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const html      = document.documentElement;
    const saved     = localStorage.getItem('sh-theme') || 'light';
    applyTheme(saved);
    toggleBtn.addEventListener('click', () => {
        const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('sh-theme', next);
    });
    function applyTheme(theme) {
        html.dataset.theme = theme;
        themeIcon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        toggleBtn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
    }
</script>
</body>
</html>
